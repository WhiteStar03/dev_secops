name: WordPress WPScan DevSecOps Loop

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    name: Scan ${{ matrix.profile }} profile
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile:
          - vulnerable
          - fixed

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start WordPress stack
        run: ./scripts/up-stack.sh "${{ matrix.profile }}" "ci-${{ matrix.profile }}"

      - name: Wait for WordPress
        run: ./scripts/wait-for-wordpress.sh "http://127.0.0.1:8090/wp-admin/install.php"

      - name: Install WordPress
        run: ./scripts/install-wordpress.sh

      - name: Run WPScan
        env:
          WPSCAN_API_TOKEN: ${{ secrets.WPSCAN_API_TOKEN }}
        run: ./scripts/run-wpscan.sh "${{ matrix.profile }}" "github-actions-${{ github.run_id }}"

      - name: Upload scan artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wpscan-${{ matrix.profile }}-${{ github.run_id }}
          path: scans/${{ matrix.profile }}/
          if-no-files-found: error

      - name: Stop WordPress stack
        if: always()
        run: ./scripts/down-stack.sh "${{ matrix.profile }}" "ci-${{ matrix.profile }}"

  publish-fixed-image-ghcr:
    name: Publish fixed image to GHCR
    runs-on: ubuntu-latest
    needs: scan
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push fixed image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/wordpress/Dockerfile
          target: fixed
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/wordpress-devsecops:latest
            ghcr.io/${{ github.repository_owner }}/wordpress-devsecops:${{ github.sha }}

  publish-fixed-image-dockerhub:
    name: Publish fixed image to Docker Hub
    runs-on: ubuntu-latest
    needs: scan
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != ''
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push fixed image to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/wordpress/Dockerfile
          target: fixed
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/wordpress-devsecops:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/wordpress-devsecops:${{ github.sha }}
